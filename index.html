<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff758c,#ff7eb3,#6a11cb,#2575fc);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.card{
width:90%;
max-width:750px;
padding:35px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(20px);
border-radius:25px;
text-align:center;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,.35);
border:1px solid rgba(255,255,255,.25);
position:relative;
z-index:10;
}

h1{
font-size:3em;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #fff;}
to{text-shadow:0 0 25px gold;}
}

h2{
margin:15px 0;
}

p{
margin:15px 0;
line-height:1.6;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:gold;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

#gift{
font-size:90px;
cursor:pointer;
transition:.5s;
margin:20px;
}

.open{
transform:rotate(20deg) scale(1.3);
}

#message{
display:none;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

img{
width:320px;
max-width:90%;
border-radius:20px;
margin:20px;
box-shadow:0 0 20px rgba(255,255,255,.6);
}

.balloon{
position:absolute;
bottom:-100px;
font-size:40px;
animation:float linear infinite;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

.confetti{
position:absolute;
width:10px;
height:10px;
background:white;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}
</style>
</head>

<body>

<div class="card">

<h1>🎉 Happy Birthday 🎉</h1>

<h2>Dear Vivek ❤️</h2>

<div id="gift">🎁</div>

<div id="message">

<img src="photo.png" alt="Photo"
onerror="this.style.display='none'">

<p>
Wishing you endless happiness, success,
good health and unforgettable memories.
May this year bring you everything you dream of.
</p>

<h2>With Love,<br>Aaradhya</h2>

<button onclick="playMusic()">🎵 Play Music</button>

</div>

</div>

<audio id="music" loop>
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>

const gift=document.getElementById("gift");
const msg=document.getElementById("message");

gift.onclick=()=>{
gift.classList.add("open");
msg.style.display="block";
gift.innerHTML="🎊";
confetti();
playMusic();
}

function playMusic(){
document.getElementById("music").play();
}

function confetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*100+"vw";
c.style.top="-20px";
c.style.background=`hsl(${Math.random()*360},100%,60%)`;
c.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);

}

}

function balloons(){

const emojis=["🎈","🎈","🎈","💖","✨"];

setInterval(()=>{

let b=document.createElement("div");
b.className="balloon";

b.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(b);

setTimeout(()=>b.remove(),10000);

},500);

}

balloons();

</script>

</body>
</html>
